<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下午值班表</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #faf9f6;
      --border: #e2ddd5;
      --text: #1a1814;
      --text-muted: #8c8680;
      --accent: #2d6a4f;
      --accent-light: #e8f4ef;
      --filled: #d8f3dc;
      --filled-text: #1b4332;
      --today-bg: #52b788;
      --weekend-bg: #efefef;
      --weekend-text: #b0aba4;
      --fullday-bg: #fff0ee;
      --fullday-border: #e9a89e;
      --fullday-text: #c0392b;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ══════ HEADER ══════ */
    header {
      background: var(--accent); color: #fff;
      padding: 0 20px; height: 54px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(45,106,79,0.25);
    }

    .h-title { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .h-title h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; }
    .h-title .tag { background: rgba(255,255,255,0.18); font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; font-family: 'DM Mono', monospace; white-space: nowrap; }

    .h-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.22); flex-shrink: 0; }

    .h-dates { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .h-dates .ctrl-lbl { font-size: 0.65rem; opacity: 0.75; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
    .h-dates .arrow { opacity: 0.6; font-size: 0.85rem; }

    .h-dates input[type="date"] {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: var(--radius-sm); padding: 4px 8px;
      font-size: 0.82rem; font-family: 'Noto Sans TC', sans-serif;
      outline: none; height: 30px; color-scheme: dark; width: 130px;
      transition: background 0.2s, border-color 0.2s;
      pointer-events: none; opacity: 0.6;
    }
    body.edit-mode .h-dates input[type="date"] { pointer-events: auto; opacity: 1; background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
    body.edit-mode .h-dates input[type="date"]:focus { background: rgba(255,255,255,0.28); }

    .days-badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 0.82rem; color: rgba(255,255,255,0.85); height: 30px; display: flex; align-items: center; white-space: nowrap; }

    .today-badge { display: flex; align-items: center; gap: 6px; background: rgba(82,183,136,0.25); border: 1px solid rgba(82,183,136,0.45); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 0.78rem; font-family: 'DM Mono', monospace; color: #a7f3c8; height: 30px; white-space: nowrap; flex-shrink: 0; }
    .today-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #52b788; animation: pulse 2s infinite; flex-shrink: 0; }

    .h-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    .sync-badge { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; opacity: 0.8; white-space: nowrap; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #52b788; animation: pulse 2s infinite; }
    .sync-dot.offline { background: #e76f51; animation: none; }
    .sync-dot.loading { background: #ffd166; animation: none; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(82,183,136,0.4); }
      70%  { box-shadow: 0 0 0 8px rgba(82,183,136,0);   }
      100% { box-shadow: 0 0 0 0   rgba(82,183,136,0);   }
    }

    .print-btn { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.14); border: 1.5px solid rgba(255,255,255,0.32); color: #fff; border-radius: 20px; padding: 4px 12px 4px 9px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 0.75rem; font-weight: 500; transition: background 0.2s; user-select: none; white-space: nowrap; flex-shrink: 0; }
    .print-btn:hover { background: rgba(255,255,255,0.24); }
    .print-label { font-size: 0.75rem; }

    .edit-toggle { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.14); border: 1.5px solid rgba(255,255,255,0.32); color: #fff; border-radius: 20px; padding: 4px 12px 4px 9px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 0.75rem; font-weight: 500; transition: background 0.2s; user-select: none; white-space: nowrap; flex-shrink: 0; }
    .edit-toggle:hover { background: rgba(255,255,255,0.24); }
    .edit-toggle.active { background: rgba(231,111,81,0.85); border-color: rgba(231,111,81,0.9); }
    .edit-toggle .lock-icon { font-size: 0.85rem; }

    /* ══════ PRINT STYLES ══════ */
    @media print {
      @page { size: A4 portrait; margin: 0.5cm; }

      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body { background: #fff !important; font-size: 11pt; }

      header, .edit-banner, .today-badge, .sync-badge,
      .print-btn, .edit-toggle, .notice-edit-btn,
      .cell-placeholder, .card-edit-btn { display: none !important; }

      .notice-wrap { margin: 0 0 10px 0; padding: 0; max-width: 100%; }
      .notice-box { border-radius: 4px; box-shadow: none; padding: 8px 12px; font-size: 9pt; background: #fffde7 !important; border: 1px solid #e0c840 !important; }
      .notice-label { margin-bottom: 4px; }

      main { padding: 0; max-width: 100%; }

      /* print title above notice */
      .print-title { display: block !important; font-size: 14pt; font-weight: 700; text-align: center; margin-bottom: 8px; color: #1a1814; letter-spacing: 0.06em; }

      .weeks-wrap { display: flex !important; flex-direction: column; gap: 14px; }
      .cards-wrap { display: none !important; }

      .week-block { page-break-inside: avoid; break-inside: avoid; }

      .week-label { font-size: 9pt; color: #555; margin-bottom: 4px; }

      .table-wrap { box-shadow: none !important; border-radius: 0 !important; border: 1px solid #ccc; overflow: visible !important; }

      table { width: 100%; border-collapse: collapse; table-layout: fixed; }

      th, td { border: 1.5px solid #999 !important; padding: 5px 6px !important; }
      td.duty-cell.weekend, th.date-header.weekend-col { border-color: #aaa !important; }

      th.dept-header { width: 72pt; font-size: 10pt; }
      th.date-header { font-size: 9pt; }
      th.date-header .date-day { font-size: 10pt; }
      th.date-header .date-week { font-size: 8pt; }

      th.date-header.today-col { background: #52b788 !important; }
      th.date-header.today-col .date-day,
      th.date-header.today-col .date-week { color: #fff !important; }
      th.date-header.today-col::after { content: '' !important; font-size: 0 !important; padding: 0 !important; margin: 0 !important; background: transparent !important; width: 0 !important; height: 0 !important; display: block !important; }

      th.date-header.weekend-col { background: #efefef !important; }
      th.date-header.fullday-col { background: #fff0ee !important; }

      .dept-cell { font-size: 10pt; padding: 6px 8px !important; background: #f8f8f6 !important; }

      .duty-cell { height: 36pt !important; min-width: 0 !important; }

      .cell-text { font-size: 10pt; font-weight: 600; color: #1b4332 !important; }
      .cell-fullday { font-size: 8pt; color: #c0392b !important; }

      .duty-cell.filled { background: #d8f3dc !important; }
      .duty-cell.weekend { background: #efefef !important; }
      .duty-cell.fullday { background: #fff0ee !important; }
      .duty-cell.today-col { background: #edfaf3 !important; border-left: 2px solid #52b788 !important; }
      .duty-cell.today-col.filled { background: #b7e4c7 !important; }
    }

    .edit-banner { display: none; background: #fff3cd; border-bottom: 2px solid #ffc107; color: #664d03; text-align: center; padding: 6px 16px; font-size: 0.8rem; font-weight: 500; }
    .edit-banner.show { display: block; }

    /* ══════ NOTICE BOX ══════ */
    .notice-wrap { max-width: 1100px; margin: 20px auto 0; padding: 0 16px; }

    .notice-box {
      background: #fffde7; border: 1px solid #f0d060; border-radius: var(--radius);
      padding: 14px 18px; font-size: 0.82rem; line-height: 1.75;
      color: #5a4a00; position: relative;
      box-shadow: var(--shadow);
    }

    .notice-box .notice-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #a07a00; margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }

    .notice-content { white-space: pre-wrap; word-break: break-word; }

    .notice-edit-btn {
      position: absolute; top: 12px; right: 12px;
      display: none;
      background: #f0d060; border: none; border-radius: var(--radius-sm);
      padding: 4px 10px; font-size: 0.72rem; font-weight: 600;
      color: #5a4a00; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      transition: background 0.15s;
    }
    .notice-edit-btn:hover { background: #e0c040; }
    body.edit-mode .notice-edit-btn { display: inline-block; }

    .notice-textarea {
      width: 100%; border: 1.5px solid #f0d060; border-radius: var(--radius-sm);
      background: #fffef5; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; line-height: 1.75; padding: 8px 10px;
      outline: none; resize: vertical; min-height: 100px; color: #5a4a00;
    }

    .notice-save-row { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    .notice-save-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 5px 14px; font-size: 0.8rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
    .notice-cancel-btn { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 14px; font-size: 0.8rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

    /* ══════ MAIN ══════ */
    main { padding: 16px 16px 48px; max-width: 1100px; margin: 0 auto; }

    .weeks-wrap { display: flex; flex-direction: column; gap: 20px; }

    .week-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; padding-left: 2px; }

    .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow-lg); background: var(--surface); }

    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); }

    th { padding: 10px 12px; font-size: 0.76rem; font-weight: 500; color: var(--text-muted); text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th.dept-header { text-align: left; color: var(--text); font-weight: 700; font-size: 0.82rem; min-width: 90px; width: 100px; }
    th.date-header { min-width: 80px; }
    th.date-header .date-day { display: block; font-size: 0.85rem; color: var(--text); font-weight: 600; font-family: 'DM Mono', monospace; }
    th.date-header .date-week { display: block; font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }

    /* weekend header */
    th.date-header.weekend-col { background: var(--weekend-bg); }
    th.date-header.weekend-col .date-day,
    th.date-header.weekend-col .date-week { color: var(--weekend-text); }

    /* fullday header (dates before duty range start or after end within same week) */
    th.date-header.fullday-col { background: #fff5f4; }
    th.date-header.fullday-col .date-day { color: var(--fullday-text); }
    th.date-header.fullday-col .date-week { color: #e07060; }

    /* today header */
    th.date-header.today-col { background: var(--today-bg); }
    th.date-header.today-col .date-day { color: #fff; font-weight: 700; }
    th.date-header.today-col .date-week { color: rgba(255,255,255,0.8); }
    th.date-header.today-col::after { content: '今天'; display: inline-block; margin-top: 3px; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.12); border-radius: 20px; padding: 1px 6px; }

    td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0; vertical-align: middle; }
    td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }

    .dept-cell { padding: 11px 14px; font-weight: 500; font-size: 0.88rem; background: var(--surface2); white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .dept-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .duty-cell { min-width: 80px; height: 50px; position: relative; transition: background 0.15s; }

    /* weekend: grey, no edit */
    .duty-cell.weekend { background: var(--weekend-bg); cursor: default !important; }
    .duty-cell.weekend .cell-placeholder { display: none; }

    /* fullday: light red, no edit */
    .duty-cell.fullday {
      background: var(--fullday-bg);
      cursor: default !important;
      border-left: 2px solid var(--fullday-border);
    }
    .duty-cell.fullday .cell-placeholder { display: none; }

    /* today: green */
    .duty-cell.today-col { background: #edfaf3; border-left: 2px solid var(--today-bg); border-right: 2px solid var(--today-bg) !important; }
    .duty-cell.today-col.filled { background: #b7e4c7; }

    body.edit-mode .duty-cell:not(.weekend):not(.fullday) { cursor: pointer; }
    body.edit-mode .duty-cell:not(.weekend):not(.fullday):not(.today-col):hover { background: var(--accent-light); }
    body.edit-mode .duty-cell.today-col:hover { background: #c7edcc; }
    body.edit-mode .duty-cell.filled:not(.weekend):not(.fullday):not(.today-col):hover { background: #c7edcc; }

    .duty-cell.filled:not(.weekend):not(.today-col):not(.fullday) { background: var(--filled); }
    .duty-cell.editing { background: var(--accent-light) !important; cursor: text; }

    .cell-text { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 0.9rem; font-weight: 500; color: var(--filled-text); padding: 0 10px; }
    .duty-cell.today-col .cell-text { color: #1b4332; font-weight: 700; }

    .cell-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 0.75rem; color: var(--border); }
    body:not(.edit-mode) .cell-placeholder { color: transparent; }

    /* fullday label inside cell */
    .cell-fullday { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; color: var(--fullday-text); opacity: 0.7; }

    .cell-input { width: 100%; height: 100%; border: 2px solid var(--accent); background: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem; text-align: center; outline: none; padding: 0 8px; }

    /* ══════ MOBILE CARDS ══════ */
    .cards-wrap { display: none; flex-direction: column; gap: 10px; }

    .day-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .day-card.weekend-card .day-card-header { background: var(--weekend-bg); }
    .day-card.weekend-card .day-date,
    .day-card.weekend-card .day-week { color: var(--weekend-text) !important; }

    .day-card.fullday-card .day-card-header { background: var(--fullday-bg); border-left: 3px solid var(--fullday-border); }
    .day-card.fullday-card .day-date { color: var(--fullday-text) !important; }
    .day-card.fullday-card .day-week { color: #e07060 !important; }

    .day-card.today-card .day-card-header { background: var(--today-bg); }
    .day-card.today-card .day-date,
    .day-card.today-card .day-week { color: #fff !important; }
    .day-card.today-card .chevron { color: rgba(255,255,255,0.7); }

    .day-card-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; user-select: none; background: var(--surface2); border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .day-card-header:active { filter: brightness(0.97); }

    .day-date { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 0.95rem; }
    .day-week { font-size: 0.78rem; color: var(--text-muted); margin-left: 7px; }

    .today-tag { background: rgba(255,255,255,0.25); color: #fff; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 20px; margin-left: 6px; }
    .fullday-tag { background: rgba(192,57,43,0.12); color: var(--fullday-text); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 20px; margin-left: 6px; }

    .filled-count { background: var(--filled); color: var(--filled-text); border-radius: 20px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
    .day-card.today-card .filled-count { background: rgba(255,255,255,0.25); color: #fff; }

    .chevron { transition: transform 0.25s; color: var(--text-muted); font-size: 0.8rem; }
    .day-card.open .chevron { transform: rotate(180deg); }

    .day-card-body { display: none; padding: 4px 0; }
    .day-card.open .day-card-body { display: block; }

    .card-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
    .card-row:last-child { border-bottom: none; }

    .card-dept { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 500; min-width: 72px; flex-shrink: 0; }
    .card-name { flex: 1; text-align: right; }
    .card-name-text { font-size: 0.9rem; font-weight: 500; color: var(--filled-text); background: var(--filled); padding: 4px 12px; border-radius: 20px; display: inline-block; }
    .card-name-empty { font-size: 0.8rem; color: var(--border); }

    .card-edit-btn { background: var(--accent-light); border: none; border-radius: var(--radius-sm); color: var(--accent); font-size: 0.78rem; padding: 5px 10px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; flex-shrink: 0; }
    body:not(.edit-mode) .card-edit-btn { display: none !important; }

    /* mobile input — key fix: use touchstart instead of blur */
    .card-input-wrap { flex: 1; display: flex; gap: 6px; align-items: center; }
    .card-input { flex: 1; border: 1.5px solid var(--accent); border-radius: var(--radius-sm); padding: 6px 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 1rem; outline: none; min-width: 0; }
    .card-save-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 6px 14px; font-size: 0.85rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; flex-shrink: 0; }

    /* ── Empty ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 0.85rem; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ══════ RESPONSIVE ══════ */
    @media (max-width: 768px) {
      .weeks-wrap { display: none; }
      .cards-wrap { display: flex; }
      header { padding: 0 12px; gap: 8px; height: auto; min-height: 48px; flex-wrap: wrap; padding-top: 8px; padding-bottom: 8px; }
      .h-title h1 { font-size: 0.95rem; }
      .h-sep { display: none; }
      .h-dates { flex-wrap: wrap; gap: 6px; width: 100%; }
      .h-dates input[type="date"] { width: 118px; font-size: 0.78rem; }
      .today-badge { display: none; }
      .sync-badge { display: none; }
      main { padding: 12px 10px 40px; }
      .notice-wrap { padding: 0 10px; margin-top: 12px; }
    }
    @media (max-width: 480px) {
      .days-badge { display: none; }
      .h-dates .ctrl-lbl { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="h-title">
    <h1>📋 下午值班表</h1>
    <span class="tag">寒暑假</span>
  </div>
  <div class="h-sep"></div>
  <div class="h-dates">
    <span class="ctrl-lbl">起始</span>
    <input type="date" id="startDate" />
    <span class="arrow">→</span>
    <span class="ctrl-lbl">結束</span>
    <input type="date" id="endDate" />
    <div class="days-badge" id="daysCountBadge">— 天</div>
  </div>
  <div class="today-badge" id="todayBadge">
    <div class="dot"></div>
    <span id="todayText">—</span>
  </div>
  <div class="h-right">
    <div class="sync-badge">
      <div class="sync-dot loading" id="syncDot"></div>
      <span id="syncText">連線中…</span>
    </div>
    <button class="print-btn" id="printBtn" title="列印班表">
      <span>🖨️</span><span class="print-label">列印</span>
    </button>
    <button class="edit-toggle" id="editToggle">
      <span class="lock-icon">🔒</span>
      <span class="toggle-label">檢視模式</span>
    </button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const DEPTS = [

  { id: 'general',  name: '總務處', color: '#457b9d' },

const WEEK_DAYS  = ['日','一','二','三','四','五','六'];
const CONFIG_DOC = 'config/settings';

const DEFAULT_NOTICE = `備考：115/7/1～115/8/29 暑假　115/8/31 開學日

一、除放假第一週（7/1-7/7）與開學前一週（8/24-8/28）應全日上班外，下午各處室至少留值 1 人以上，其餘人員需至差勤系統申請寒暑休，以維持公務之正常運作。

二、寒暑假期間上午 8 時至 12 時；下午 12 時至 16 時。`;

let schedule    = {};
let unsubscribe = null;
let activeInput = null;
let editMode    = false;
let noticeText  = DEFAULT_NOTICE;

const startDateEl    = document.getElementById('startDate');
const endDateEl      = document.getElementById('endDate');

// ── Notice ────────────────────────────────────────────────
async function loadNotice() {
  try {
    const snap = await getDoc(doc(db, NOTICE_DOC));
    if (snap.exists() && snap.data().text) noticeText = snap.data().text;

}

noticeEditBtn.addEventListener('click', () => {
  const box = document.getElementById('noticeBox');

  noticeContent.style.display = 'none';
  noticeEditBtn.style.display = 'none';

  ta.value = noticeText;
  box.appendChild(ta);

  const row = document.createElement('div');

  box.appendChild(row);
  ta.focus();

  row.querySelector('.notice-cancel-btn').addEventListener('click', () => {
    ta.remove(); row.remove();

  row.querySelector('.notice-save-btn').addEventListener('click', async () => {

    noticeContent.textContent = noticeText;
    ta.remove(); row.remove();
    noticeContent.style.display = '';
    noticeEditBtn.style.display = '';
    try {
      await setDoc(doc(db, NOTICE_DOC), { text: noticeText });

    } catch(e) { showToast('儲存失敗，請檢查網路'); }
  });
});

// ── Edit mode ────────────────────────────────────────────
function setEditMode(on) {
  editMode = on;
  document.body.classList.toggle('edit-mode', on);
  editToggleBtn.classList.toggle('active', on);
  editToggleBtn.querySelector('.lock-icon').textContent   = on ? '✏️' : '🔒';
  editToggleBtn.querySelector('.toggle-label').textContent = on ? '編輯中' : '檢視模式';
  editBanner.classList.toggle('show', on);
  if (!on && activeInput) cancelEdit(activeInput);
  render();
}

editToggleBtn.addEventListener('click', () => setEditMode(!editMode));

// ── Helpers ──────────────────────────────────────────────
function dateStr(d) { return d.toISOString().split('T')[0]; }
function todayStr() { return dateStr(new Date()); }
function isWeekend(d) { const w = d.getDay(); return w === 0 || w === 6; }

// "fullday" = dates in the first/last partial week that fall outside the duty start/end
// We pad each week to Mon–Sun. Days before startDate or after endDate = fullday display
let _startDate = null;
let _endDate   = null;

function isFullDay(d) {
  if (!_startDate || !_endDate) return false;
  const t = d.getTime();
  return t < _startDate.getTime() || t > _endDate.getTime();
}

function getDates() {
  if (!startDateEl.value || !endDateEl.value) return [];
  _startDate = new Date(startDateEl.value + 'T00:00:00');
  _endDate   = new Date(endDateEl.value   + 'T00:00:00');
  if (isNaN(_startDate) || isNaN(_endDate) || _endDate < _startDate) return [];
  const dates = [];
  for (let d = new Date(_startDate); d <= _endDate; d.setDate(d.getDate() + 1)) {
    dates.push(new Date(d));
  }
  return dates;
}

// Split into Mon-Sun weeks, padding each week to a full 7-day display
function splitIntoWeeks(dates) {
  if (!dates.length) return [];
  const weeks = [];
  let week = [];
  // find start: go back to Monday
  const start = new Date(dates[0]);
  const dayOfWeek = start.getDay(); // 0=Sun
  const daysBack = dayOfWeek === 0 ? 6 : dayOfWeek - 1; // days back to get Monday
  start.setDate(start.getDate() - daysBack);

  // find end: go forward to Sunday
  const end = new Date(dates[dates.length - 1]);
  const endDow = end.getDay();
  const daysForward = endDow === 0 ? 0 : 7 - endDow;
  end.setDate(end.getDate() + daysForward);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    week.push(new Date(d));
    if (d.getDay() === 0) { // Sunday — end of week
      weeks.push(week);
      week = [];
    }
  }
  if (week.length) weeks.push(week);
  return weeks;
}

function updateDaysCount() {
  const dates = getDates();
  daysCountEl.textContent = dates.length > 0 ? `${dates.length} 天` : '— 天';
  updateTodayBadge();
}

function updateTodayBadge() {
  const today = new Date();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const w  = WEEK_DAYS[today.getDay()];
  todayTextEl.textContent = `今天 ${mm}/${dd}（${w}）`;
  const dates = getDates();
  const inRange = dates.some(d => dateStr(d) === todayStr());
  todayBadge.style.opacity = inRange ? '1' : '0.45';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setSyncStatus(status) {
  syncDot.className = 'sync-dot ' + status;
  syncText.textContent = status === 'loading' ? '連線中…' : status === 'offline' ? '離線' : '即時同步';
}

// ── Firebase ──────────────────────────────────────────────
async function loadConfig() {
  try {
    const snap = await getDoc(doc(db, CONFIG_DOC));
    if (snap.exists()) {
      const data = snap.data();
      if (data.startDate) startDateEl.value = data.startDate;
      if (data.endDate)   endDateEl.value   = data.endDate;
    }
  } catch(e) {}
  updateDaysCount();
}

async function saveConfig() {
  try { await setDoc(doc(db, CONFIG_DOC), { startDate: startDateEl.value, endDate: endDateEl.value }); } catch(e) {}
}

function subscribeData() {
  if (unsubscribe) unsubscribe();
  setSyncStatus('loading');
  unsubscribe = onSnapshot(doc(db, DATA_DOC), (snap) => {
    schedule = snap.exists() ? (snap.data() || {}) : {};
    setSyncStatus('online');
    render();
  }, () => setSyncStatus('offline'));
}

async function saveCell(dateKey, deptId, value) {
  try { await setDoc(doc(db, DATA_DOC), { [`${dateKey}__${deptId}`]: value }, { merge: true }); }
  catch(e) { showToast('儲存失敗，請檢查網路'); }
}

function getValue(dateKey, deptId) { return schedule[`${dateKey}__${deptId}`] || ''; }

// ── Render ───────────────────────────────────────────────
function render() {
  const dates = getDates();
  if (!dates.length) {
    contentEl.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>請先設定起始與結束日期</p></div>`;
    return;
  }
  contentEl.innerHTML = '';
  if (window.innerWidth <= 768) renderCards(dates);
  else renderWeeks(dates);
}

// ── Desktop: week-by-week ────────────────────────────────
function renderWeeks(dates) {
  const wrap = document.createElement('div');
  wrap.className = 'weeks-wrap';
  const weeks = splitIntoWeeks(dates);
  const today = todayStr();
  let weekIdx = 0;

  weeks.forEach((weekDates) => {
    const block = document.createElement('div');
    block.className = 'week-block';

    // count only non-fullday, non-weekend days for week label numbering
    const realDays = weekDates.filter(d => !isFullDay(d) && !isWeekend(d));
    if (realDays.length === 0) return; // skip entirely empty weeks

    weekIdx++;
    const dutyDays = weekDates.filter(d => !isFullDay(d));
    const first = dutyDays[0] || weekDates[0];
    const last  = dutyDays[dutyDays.length-1] || weekDates[weekDates.length-1];
    const hasToday = weekDates.some(d => dateStr(d) === today);

    const label = document.createElement('div');
    label.className = 'week-label';
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    label.textContent = `第 ${weekIdx} 週　${fmt(first)} – ${fmt(last)}${hasToday ? '　◀ 本週' : ''}`;
    if (hasToday) label.style.color = 'var(--accent)';
    block.appendChild(label);

    const tableWrap = document.createElement('div');
    tableWrap.className = 'table-wrap';
    const table = document.createElement('table');

    // thead
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    const thDept = document.createElement('th');
    thDept.className = 'dept-header';
    thDept.textContent = '處室 / 日期';
    headRow.appendChild(thDept);

    weekDates.forEach(d => {
      const th = document.createElement('th');
      const isWE = isWeekend(d);
      const isFD = !isWE && isFullDay(d);
      const isTd = dateStr(d) === today;
      th.className = 'date-header' +
        (isTd      ? ' today-col'   : '') +
        (isWE && !isTd ? ' weekend-col' : '') +
        (isFD && !isTd ? ' fullday-col' : '');
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      th.innerHTML = `<span class="date-day">${mm}/${dd}</span><span class="date-week">（${WEEK_DAYS[d.getDay()]}）</span>`;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    // tbody
    const tbody = document.createElement('tbody');
    DEPTS.forEach(dept => {
      const tr = document.createElement('tr');
      const tdDept = document.createElement('td');
      tdDept.innerHTML = `<div class="dept-cell"><div class="dept-dot" style="background:${dept.color}"></div>${dept.name}</div>`;
      tr.appendChild(tdDept);

      weekDates.forEach(d => {
        const key  = dateStr(d);
        const val  = getValue(key, dept.id);
        const isWE = isWeekend(d);
        const isFD = !isWE && isFullDay(d);
        const isTd = key === today;
        const td = document.createElement('td');
        td.className = 'duty-cell' +
          (isWE         ? ' weekend'   : '') +
          (isFD         ? ' fullday'   : '') +
          (isTd         ? ' today-col' : '') +
          (!isWE && !isFD && val ? ' filled' : '');
        td.dataset.date = key;
        td.dataset.dept = dept.id;

        if (isWE) {
          td.innerHTML = '';
        } else if (isFD) {
          td.innerHTML = `<div class="cell-fullday">全天班</div>`;
        } else {
          td.innerHTML = val
            ? `<div class="cell-text">${val}</div>`
            : `<div class="cell-placeholder">點擊填寫</div>`;
          td.addEventListener('click', () => { if (editMode) startEdit(td, key, dept.id); });
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    tableWrap.appendChild(table);
    block.appendChild(tableWrap);
    wrap.appendChild(block);
  });

  contentEl.appendChild(wrap);

  // scroll to today's week
  setTimeout(() => {
    const todayLabel = [...wrap.querySelectorAll('.week-label')].find(el => el.textContent.includes('本週'));
    if (todayLabel) todayLabel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

// ── Edit (desktop) ────────────────────────────────────────
function startEdit(td, dateKey, deptId) {
  if (td.classList.contains('editing')) return;
  if (activeInput) cancelEdit(activeInput);
  const val = getValue(dateKey, deptId);
  td.classList.add('editing');
  td.innerHTML = `<input class="cell-input" type="text" value="${val}" placeholder="輸入姓名" maxlength="10" />`;
  const input = td.querySelector('input');
  input.focus(); input.select();
  activeInput = { td, dateKey, deptId };
  input.addEventListener('blur', () => { if (activeInput) commitEdit(activeInput, input.value.trim()); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') cancelEdit(activeInput);
  });
}

function cancelEdit({ td, dateKey, deptId }) {
  const val = getValue(dateKey, deptId);
  const isTd = dateKey === todayStr();
  td.classList.remove('editing');
  td.className = 'duty-cell' + (isTd ? ' today-col' : '') + (val ? ' filled' : '');
  td.innerHTML = val ? `<div class="cell-text">${val}</div>` : `<div class="cell-placeholder">點擊填寫</div>`;
  activeInput = null;
}

async function commitEdit({ td, dateKey, deptId }, newVal) {
  const isTd = dateKey === todayStr();
  td.classList.remove('editing');
  td.className = 'duty-cell' + (isTd ? ' today-col' : '') + (newVal ? ' filled' : '');
  td.innerHTML = newVal ? `<div class="cell-text">${newVal}</div>` : `<div class="cell-placeholder">點擊填寫</div>`;
  td.addEventListener('click', () => { if (editMode) startEdit(td, dateKey, deptId); });
  activeInput = null;
  const oldVal = getValue(dateKey, deptId);
  if (newVal !== oldVal) {
    schedule[`${dateKey}__${deptId}`] = newVal;
    await saveCell(dateKey, deptId, newVal);
    if (newVal) showToast(`✅ 已儲存：${newVal}`);
  }
}

// ── Mobile cards ──────────────────────────────────────────
function renderCards(dates) {
  const wrap = document.createElement('div');
  wrap.className = 'cards-wrap';
  const today = todayStr();

  // pad to full weeks for mobile too
  const allWeeks = splitIntoWeeks(dates);
  const allDays = allWeeks.flat();

  let todayCard = null;

  allDays.forEach(d => {
    const key     = dateStr(d);
    const isToday = key === today;
    const isWE    = isWeekend(d);
    const isFD    = !isWE && isFullDay(d);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const filledCount = (!isWE && !isFD) ? DEPTS.filter(dep => getValue(key, dep.id)).length : 0;

    const card = document.createElement('div');
    card.className = 'day-card' +
      (isWE    ? ' weekend-card' : '') +
      (isFD    ? ' fullday-card' : '') +
      (isToday ? ' today-card'   : '');

    const rightBadge = isWE
      ? `<span style="font-size:0.72rem;color:var(--weekend-text)">休假</span>`
      : isFD
        ? `<span style="font-size:0.72rem;color:var(--fullday-text)">全天班</span>`
        : filledCount > 0 ? `<span class="filled-count">${filledCount}/4</span>` : '';

    card.innerHTML = `
      <div class="day-card-header">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;">
          <span class="day-date">${mm}/${dd}</span>
          <span class="day-week">（${WEEK_DAYS[d.getDay()]}）</span>
          ${isToday ? '<span class="today-tag">今天</span>' : ''}
          ${isFD    ? '<span class="fullday-tag">全天班</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${rightBadge}
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="day-card-body" id="body-${key}"></div>
    `;

    card.querySelector('.day-card-header').addEventListener('click', () => card.classList.toggle('open'));

    const body = card.querySelector(`#body-${key}`);

    if (isWE) {
      body.innerHTML = `<div style="padding:12px 16px;font-size:0.82rem;color:var(--weekend-text);text-align:center;">六日休假，無需填寫</div>`;
    } else if (isFD) {
      body.innerHTML = `<div style="padding:12px 16px;font-size:0.82rem;color:var(--fullday-text);text-align:center;">全天上班日，無下午值班安排</div>`;
    } else {
      DEPTS.forEach(dept => {
        const val = getValue(key, dept.id);
        const row = document.createElement('div');
        row.className = 'card-row';
        row.innerHTML = `
          <div class="card-dept">
            <div class="dept-dot" style="background:${dept.color}"></div>
            ${dept.name}
          </div>
          <div class="card-name" id="name-${key}-${dept.id}">
            ${val ? `<span class="card-name-text">${val}</span>` : `<span class="card-name-empty">未填寫</span>`}
          </div>
          <button class="card-edit-btn" data-date="${key}" data-dept="${dept.id}">
            ${val ? '修改' : '填寫'}
          </button>
        `;
        body.appendChild(row);
      });
    }

    wrap.appendChild(card);
    if (isToday) { card.classList.add('open'); todayCard = card; }
  });

  contentEl.appendChild(wrap);

  // scroll today card to top
  if (todayCard) {
    setTimeout(() => {
      // offset for sticky header
      const headerH = document.querySelector('header').offsetHeight + 8;
      const top = todayCard.getBoundingClientRect().top + window.scrollY - headerH;
      window.scrollTo({ top, behavior: 'smooth' });
    }, 300);
  }

  // ── Mobile input: avoid blur-on-keyboard issue ──────────
  // Use touchstart on save button to prevent blur firing before tap registers
  wrap.addEventListener('click', (e) => {
    const btn = e.target.closest('.card-edit-btn');
    if (!btn || !editMode) return;
    startCardEdit(btn, btn.dataset.date, btn.dataset.dept);
  });
}

function startCardEdit(btn, dateKey, deptId) {
  const nameDiv = document.getElementById(`name-${dateKey}-${deptId}`);
  if (!nameDiv) return;
  const val = getValue(dateKey, deptId);

  nameDiv.innerHTML = `
    <div class="card-input-wrap">
      <input class="card-input" type="text" value="${val}" placeholder="輸入姓名" maxlength="10" autocomplete="off" />
      <button class="card-save-btn" type="button">確認</button>
    </div>
  `;
  btn.style.display = 'none';

  const input   = nameDiv.querySelector('input');
  const saveBtn = nameDiv.querySelector('.card-save-btn');

  // ── KEY FIX: prevent blur from firing when tapping save ──
  // mousedown/touchstart fires BEFORE blur; we mark a flag to suppress blur
  let saving = false;

  saveBtn.addEventListener('mousedown', () => { saving = true; });
  saveBtn.addEventListener('touchstart', () => { saving = true; }, { passive: true });

  const commit = async () => {
    const newVal = input.value.trim();
    schedule[`${dateKey}__${deptId}`] = newVal;
    nameDiv.innerHTML = newVal
      ? `<span class="card-name-text">${newVal}</span>`
      : `<span class="card-name-empty">未填寫</span>`;
    btn.textContent = newVal ? '修改' : '填寫';
    btn.style.display = '';

    const count = DEPTS.filter(d => getValue(dateKey, d.id)).length;
    const card  = btn.closest('.day-card');
    let badge   = card.querySelector('.filled-count');
    if (count > 0) {
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'filled-count';
        card.querySelector('.day-card-header > div:last-child').prepend(badge);
      }
      badge.textContent = `${count}/4`;
    } else if (badge) badge.remove();

    if (newVal !== val) {
      await saveCell(dateKey, deptId, newVal);
      if (newVal) showToast(`✅ 已儲存：${newVal}`);
    }
  };

  input.addEventListener('blur', () => {
    if (saving) { saving = false; return; } // tapping save — don't dismiss yet
    commit();
  });

  saveBtn.addEventListener('click', () => { saving = false; commit(); });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { input.blur(); } });

  // focus after paint so keyboard shows on mobile
  requestAnimationFrame(() => { input.focus(); });
}

// ── Print ─────────────────────────────────────────────────
document.getElementById('printBtn').addEventListener('click', () => {
  // update print title with date range
  const s = startDateEl.value.replace(/-/g,'/');
  const e = endDateEl.value.replace(/-/g,'/');
  document.getElementById('printTitle').textContent = `下午值班表　${s} ～ ${e}`;
  window.print();
});

// ── Init ─────────────────────────────────────────────────
async function init() {
  const today = new Date();
  const end   = new Date(today); end.setDate(today.getDate() + 13);
  startDateEl.value = dateStr(today);
  endDateEl.value   = dateStr(end);

  await loadConfig();
  await loadNotice();
  updateTodayBadge();
  subscribeData();

  startDateEl.addEventListener('change', () => { updateDaysCount(); saveConfig(); render(); });
  endDateEl.addEventListener('change',   () => { updateDaysCount(); saveConfig(); render(); });
  window.addEventListener('resize', render);
}

init();
</script>
